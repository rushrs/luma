name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: macos-latest
    steps:
      # Pinned action SHAs:
      # - actions/checkout v6.0.2 uses Node 24.
      # - dtolnay/rust-toolchain v1 is a composite action.
      # - Swatinem/rust-cache v2.9.1 uses Node 24.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --locked --all-features
      - name: Clean sync smoke test
        run: |
          cargo build --locked --release
          TMP_HOME="$(mktemp -d)"
          HOME="$TMP_HOME" LUMA_NO_LIVE=1 ./target/release/lumactl sync
          mkdir -p "$TMP_HOME/.config/luma/themes"
          cp examples/themes/example-dark.json "$TMP_HOME/.config/luma/themes/ci-theme.json"
          HOME="$TMP_HOME" LUMA_NO_LIVE=1 ./target/release/lumactl config --light ci-theme --dark ci-theme --plugins tmux,k9s,pi --theme-dir "$TMP_HOME/.config/luma/themes"
          HOME="$TMP_HOME" LUMA_NO_LIVE=1 ./target/release/lumactl theme validate
          HOME="$TMP_HOME" LUMA_NO_LIVE=1 ./target/release/lumactl palettes | grep ci-theme

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - name: Install audit tools
        run: |
          cargo install cargo-audit --version 0.22.1 --locked
          cargo install cargo-deny --version 0.19.6 --locked
      - name: RustSec audit
        run: cargo audit --deny warnings
      - name: Dependency policy audit
        run: cargo deny check all
